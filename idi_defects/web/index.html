<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#1F4E78" />
<title>IDI 缺陷速查</title>

<!-- ===== 百度统计 (请把 BAIDU_HM_ID_HERE 替换为真实统计 ID) ===== -->
<script>
var _hmt = _hmt || [];
(function() {
  var hm = document.createElement("script");
  hm.src = "https://hm.baidu.com/hm.js?BAIDU_HM_ID_HERE";
  var s = document.getElementsByTagName("script")[0];
  s.parentNode.insertBefore(hm, s);
})();
</script>

<script src="https://cdn.tailwindcss.com"></script>
<style>
  html, body { -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; }
  .hl { background:#fde68a; color:#7c2d12; padding:0 1px; border-radius:2px; }
  /* iOS 安全区 */
  .pt-safe { padding-top: env(safe-area-inset-top); }
  .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
  /* 滚动隐藏类别条滚动条 */
  .scroll-x::-webkit-scrollbar { display: none; }
  .scroll-x { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

<!-- ===== 登录/注册界面 ===== -->
<div id="auth-screen" class="fixed inset-0 z-50 bg-[#1F4E78] flex items-center justify-center px-4">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6">
    <h2 class="text-xl font-bold text-center text-[#1F4E78] mb-1">IDI 缺陷速查</h2>
    <p class="text-xs text-slate-400 text-center mb-6">请登录后使用</p>

    <div id="auth-form">
      <input id="auth-username" type="text" placeholder="用户名" autocomplete="username"
             class="w-full rounded-lg border border-slate-200 px-3 py-2.5 text-base mb-3 outline-none focus:border-[#1F4E78]" />
      <input id="auth-password" type="password" placeholder="密码" autocomplete="current-password"
             class="w-full rounded-lg border border-slate-200 px-3 py-2.5 text-base mb-3 outline-none focus:border-[#1F4E78]" />
      <input id="auth-code" type="text" placeholder="注册密令"
             class="w-full rounded-lg border border-slate-200 px-3 py-2.5 text-base mb-3 outline-none focus:border-[#1F4E78]" />
      <label class="flex items-center gap-2 mb-4 text-sm text-slate-600 cursor-pointer">
        <input id="auth-remember" type="checkbox" class="w-4 h-4 rounded border-slate-300 text-[#1F4E78]" />
        <span>记住我（一年内免登录）</span>
      </label>
      <div id="auth-error" class="hidden text-xs text-rose-600 mb-3 text-center"></div>
      <button id="btn-login" class="w-full rounded-lg bg-[#1F4E78] text-white py-2.5 text-base font-medium active:opacity-80">登录</button>
      <button id="btn-register" class="w-full rounded-lg bg-white text-[#1F4E78] border border-[#1F4E78] py-2.5 text-base font-medium mt-2 active:bg-slate-50">注册新账号</button>
    </div>
  </div>
</div>

<!-- ===== 主应用界面 ===== -->
<div id="app-screen" class="hidden">

<!-- 顶栏 -->
<header class="sticky top-0 z-30 bg-[#1F4E78] text-white shadow-md pt-safe">
  <div class="px-3 pt-2 pb-2">
    <div class="flex items-center gap-2 mb-2">
      <h1 class="text-base font-semibold flex-1">IDI 缺陷速查</h1>
      <span id="count" class="text-xs opacity-80">加载中…</span>
      <div class="flex items-center gap-2">
        <span id="user-name" class="text-xs opacity-80 hidden"></span>
        <a id="admin-link" href="/admin.html" class="text-xs underline opacity-80 hidden">管理后台</a>
        <button id="btn-logout" class="text-xs bg-white/20 px-2 py-1 rounded active:bg-white/30 hidden">退出</button>
      </div>
    </div>
    <div class="relative">
      <input id="q" type="search" enterkeyhint="search" autocomplete="off"
             placeholder="搜索关键词,空格分隔多词 AND"
             class="w-full rounded-lg bg-white/95 text-slate-900 placeholder-slate-400 px-3 py-2 text-base outline-none ring-0 focus:bg-white" />
      <button id="clear" class="hidden absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 active:text-slate-700 text-lg w-7 h-7 flex items-center justify-center">×</button>
    </div>
  </div>
  <!-- 类别快捷筛选 -->
  <div id="cat-bar" class="scroll-x overflow-x-auto whitespace-nowrap px-2 pb-2 -mt-1">
    <!-- chip buttons inject here -->
  </div>
</header>

<!-- 工具栏(选中态) -->
<div id="filterhint" class="hidden px-3 py-1.5 bg-amber-50 border-b border-amber-200 text-xs text-amber-800 flex items-center justify-between">
  <span id="filterhint-text"></span>
  <button id="resetfilter" class="underline">清除筛选</button>
</div>

<!-- 结果区 -->
<main id="list" class="px-2 py-2 space-y-2 pb-24"></main>

<!-- 空态 -->
<div id="empty" class="hidden text-center text-slate-400 pt-12 pb-24">
  <div class="text-4xl">🔎</div>
  <div class="mt-2 text-sm">没有匹配的缺陷条目,试试换个关键词</div>
</div>

<!-- toast -->
<div id="toast" class="fixed bottom-20 left-1/2 -translate-x-1/2 bg-slate-900/90 text-white text-sm px-4 py-2 rounded-full opacity-0 transition-opacity duration-200 pointer-events-none z-50"></div>

<!-- 底部状态 -->
<footer class="fixed bottom-0 inset-x-0 bg-white/90 backdrop-blur border-t border-slate-200 text-[11px] text-slate-500 px-3 py-2 pb-safe flex justify-between">
  <span>共 599 条 · 数据来源:IDI 质量险潜在缺陷清单合集 2025.03.22</span>
  <button id="top" class="text-[#1F4E78] font-medium">回顶</button>
</footer>

</div> <!-- /#app-screen -->

<!-- 图片放大查看 -->
<div id="lightbox" class="fixed inset-0 z-50 bg-black/90 hidden flex items-center justify-center p-4" onclick="this.classList.add('hidden')">
  <img id="lightbox-img" class="max-w-full max-h-[90vh] rounded-lg" />
</div>

<template id="card-tpl">
  <article class="bg-white rounded-xl shadow-sm border border-slate-100 p-3">
    <div class="flex items-center gap-1.5 mb-2 flex-wrap">
      <span data-f="period" class="text-[10px] font-medium px-1.5 py-0.5 rounded bg-rose-50 text-rose-700"></span>
      <span data-f="major"  class="text-[10px] font-medium px-1.5 py-0.5 rounded bg-blue-50 text-blue-700"></span>
      <span data-f="minor"  class="text-[10px] font-medium px-1.5 py-0.5 rounded bg-slate-100 text-slate-600"></span>
      <span data-f="id"     class="text-[10px] ml-auto text-slate-400"></span>
    </div>
    <img data-f="image" class="w-full rounded-lg mb-2 hidden" style="max-height:200px;object-fit:cover;cursor:pointer;" />
    <div class="text-[15px] font-semibold leading-snug" data-f="problem"></div>
    <div class="mt-2 text-[13px] text-slate-600 leading-relaxed" data-f="standard"></div>
    <details class="mt-2 group">
      <summary class="text-[13px] text-[#1F4E78] font-medium cursor-pointer select-none list-none">
        <span class="inline-flex items-center gap-1">
          <span class="group-open:rotate-90 transition-transform">▶</span>
          纠正和预防建议
        </span>
      </summary>
      <div class="mt-1.5 text-[13px] leading-relaxed text-slate-700" data-f="suggestion"></div>
    </details>
    <div class="mt-3 grid grid-cols-3 gap-1.5">
      <button data-copy="problem"    class="text-xs py-2 rounded-md bg-slate-100 active:bg-slate-200">复制问题</button>
      <button data-copy="suggestion" class="text-xs py-2 rounded-md bg-slate-100 active:bg-slate-200">复制建议</button>
      <button data-copy="all"        class="text-xs py-2 rounded-md bg-[#1F4E78] text-white active:opacity-80">复制全部</button>
    </div>
  </article>
</template>

<script>
(() => {
  const $ = (s, p=document) => p.querySelector(s);
  const $$ = (s, p=document) => Array.from(p.querySelectorAll(s));

  // ===== 认证相关 =====
  const API_BASE = "";
  let authToken = localStorage.getItem("idi_token") || "";

  function showAuth() {
    $("#auth-screen").classList.remove("hidden");
    $("#app-screen").classList.add("hidden");
  }
  function showApp() {
    $("#auth-screen").classList.add("hidden");
    $("#app-screen").classList.remove("hidden");
    $("#user-name").classList.remove("hidden");
    $("#btn-logout").classList.remove("hidden");
  }

  async function api(path, opts = {}) {
    const url = API_BASE + path;
    const headers = { "Content-Type": "application/json", ...opts.headers };
    if (authToken) headers["Authorization"] = "Bearer " + authToken;
    const res = await fetch(url, { ...opts, headers });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.detail || "请求失败");
    return data;
  }

  async function doLogin() {
    const username = $("#auth-username").value.trim();
    const password = $("#auth-password").value;
    const remember = $("#auth-remember").checked;
    if (!username || !password) { showAuthError("请输入用户名和密码"); return; }
    try {
      const data = await api("/api/auth/login", {
        method: "POST",
        body: JSON.stringify({ username, password, remember })
      });
      authToken = data.access_token;
      localStorage.setItem("idi_token", authToken);
      enterApp(username);
    } catch (e) { showAuthError(e.message); }
  }

  async function doRegister() {
    const username = $("#auth-username").value.trim();
    const password = $("#auth-password").value;
    const code = $("#auth-code").value.trim();
    const remember = $("#auth-remember").checked;
    if (!username || !password) { showAuthError("请输入用户名和密码"); return; }
    if (password.length < 6) { showAuthError("密码至少6位"); return; }
    if (!code) { showAuthError("请输入注册密令"); return; }
    try {
      const data = await api("/api/auth/register", {
        method: "POST",
        body: JSON.stringify({ username, password, remember, code })
      });
      authToken = data.access_token;
      localStorage.setItem("idi_token", authToken);
      enterApp(username);
    } catch (e) { showAuthError(e.message); }
  }

  function showAuthError(msg) {
    const el = $("#auth-error");
    el.textContent = msg;
    el.classList.remove("hidden");
  }

  function enterApp(username) {
    $("#auth-error").classList.add("hidden");
    $("#auth-username").value = "";
    $("#auth-password").value = "";
    $("#user-name").textContent = username;
    showApp();
    loadData();
  }

  function doLogout() {
    authToken = "";
    localStorage.removeItem("idi_token");
    $("#user-name").textContent = "";
    $("#user-name").classList.add("hidden");
    $("#admin-link").classList.add("hidden");
    $("#btn-logout").classList.add("hidden");
    showAuth();
  }

  // 事件绑定
  $("#btn-login").addEventListener("click", doLogin);
  $("#btn-register").addEventListener("click", doRegister);
  $("#btn-logout").addEventListener("click", doLogout);
  $("#auth-password").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

  // 页面加载: 检查 token
  async function checkAuth() {
    if (!authToken) { showAuth(); return; }
    try {
      const data = await api("/api/auth/me");
      enterApp(data.username);
      // 检查管理员权限
      try {
        const adminRes = await fetch("/api/admin/check", { headers: { "Authorization": "Bearer " + authToken } });
        if (adminRes.ok) {
          const adminData = await adminRes.json();
          if (adminData.is_admin) {
            $("#admin-link").classList.remove("hidden");
          }
        }
      } catch (e) {}
    } catch (e) {
      authToken = "";
      localStorage.removeItem("idi_token");
      showAuth();
    }
  }

  // 图片放大
  function showLightbox(src) {
    const box = $("#lightbox");
    $("#lightbox-img").src = src;
    box.classList.remove("hidden");
  }

  // ----- 埋点 (百度统计自定义事件) -----
  // category: 大类(search/copy/filter), action: 具体动作, label: 详细
  function track(category, action, label) {
    try {
      (window._hmt = window._hmt || []).push(['_trackEvent', category, action, String(label || '')]);
    } catch(e) {}
  }

  const state = {
    data: [],
    filtered: [],
    q: "",
    period: null,   // 选中的风险期限
    major: null,    // 选中的大类
    pageSize: 50,
    page: 1,
  };

  // ----------- 加载数据 -----------
  async function loadData() {
    try {
      const res = await fetch("defects.json", {
        cache: "no-cache",
        headers: authToken ? { "Authorization": "Bearer " + authToken } : {}
      });
      if (!res.ok) throw new Error("加载失败 " + res.status);
      const data = await res.json();
      state.data = data;
      $("#count").textContent = `共 ${data.length} 条`;
      buildCategoryBar();
      render();
    } catch (err) {
      $("#count").textContent = "加载失败";
      $("#list").innerHTML = `<div class="p-4 bg-white rounded-lg text-rose-600 text-sm">无法加载数据: ${err.message}</div>`;
    }
  }

  // 启动: 先检查登录状态
  checkAuth();

  // ----------- 类别 chip 条 -----------
  function buildCategoryBar() {
    const bar = $("#cat-bar");
    bar.innerHTML = "";
    // 风险期限
    const periods = uniq(state.data.map(d => d.category_period));
    periods.forEach(p => {
      const btn = chip(p, "period");
      bar.appendChild(btn);
    });
    // 分隔
    const sep = document.createElement("span");
    sep.className = "inline-block w-px h-4 bg-white/30 mx-1 align-middle";
    bar.appendChild(sep);
    // 大类
    const majors = uniq(state.data.map(d => d.category_major));
    majors.forEach(m => {
      const btn = chip(m, "major");
      bar.appendChild(btn);
    });
  }
  function chip(label, kind) {
    const b = document.createElement("button");
    b.className = "inline-block text-xs px-2.5 py-1 rounded-full bg-white/15 text-white mr-1.5 active:bg-white/30";
    b.textContent = label;
    b.dataset.kind = kind;
    b.dataset.value = label;
    b.addEventListener("click", () => {
      if (state[kind] === label) state[kind] = null;
      else state[kind] = label;
      updateChipStyle();
      state.page = 1;
      // 埋点:类别筛选
      if (state[kind]) track('filter', kind, label);
      else track('filter', kind + '_clear', '');
      render();
    });
    return b;
  }
  function updateChipStyle() {
    $$("#cat-bar button").forEach(b => {
      const kind = b.dataset.kind, val = b.dataset.value;
      if (state[kind] === val) {
        b.className = "inline-block text-xs px-2.5 py-1 rounded-full bg-amber-300 text-amber-900 font-medium mr-1.5";
      } else {
        b.className = "inline-block text-xs px-2.5 py-1 rounded-full bg-white/15 text-white mr-1.5 active:bg-white/30";
      }
    });
    // 顶部筛选提示条
    const parts = [];
    if (state.period) parts.push(`期限:${state.period}`);
    if (state.major) parts.push(`大类:${state.major}`);
    if (parts.length) {
      $("#filterhint").classList.remove("hidden");
      $("#filterhint-text").textContent = "已筛选 " + parts.join(" / ");
    } else {
      $("#filterhint").classList.add("hidden");
    }
  }

  // ----------- 搜索 -----------
  let qTimer;
  $("#q").addEventListener("input", e => {
    state.q = e.target.value.trim();
    $("#clear").classList.toggle("hidden", !state.q);
    clearTimeout(qTimer);
    qTimer = setTimeout(() => {
      state.page = 1;
      render();
      // 埋点:用户搜索关键词(只在长度 >= 2 时上报,避免单字噪音)
      if (state.q.length >= 2) track('search', 'keyword', state.q);
    }, 120);
  });
  $("#clear").addEventListener("click", () => {
    $("#q").value = "";
    state.q = "";
    $("#clear").classList.add("hidden");
    state.page = 1;
    render();
  });
  $("#resetfilter").addEventListener("click", () => {
    state.period = null; state.major = null;
    updateChipStyle();
    state.page = 1; render();
  });
  $("#top").addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));

  // ----------- 渲染 -----------
  function render() {
    const tokens = state.q ? state.q.split(/\s+/).filter(Boolean) : [];
    const out = state.data.filter(d => {
      if (state.period && d.category_period !== state.period) return false;
      if (state.major && d.category_major !== state.major) return false;
      if (!tokens.length) return true;
      const hay = (d.problem + " " + d.standard + " " + d.suggestion + " " + d.category_minor).toLowerCase();
      return tokens.every(t => hay.includes(t.toLowerCase()));
    });
    state.filtered = out;

    const total = out.length;
    const list = $("#list");
    list.innerHTML = "";
    $("#empty").classList.toggle("hidden", total > 0);

    const slice = out.slice(0, state.page * state.pageSize);
    const tpl = $("#card-tpl").content;

    for (const d of slice) {
      const node = tpl.cloneNode(true);
      const card = node.querySelector("article");
      setHL(card.querySelector('[data-f="period"]'), d.category_period, []);
      setHL(card.querySelector('[data-f="major"]'),  d.category_major, []);
      setHL(card.querySelector('[data-f="minor"]'),  d.category_minor, []);
      card.querySelector('[data-f="id"]').textContent = d.global_id;
      // 图片
      const imgEl = card.querySelector('[data-f="image"]');
      if (d.image) {
        imgEl.src = "imgs/" + d.image;
        imgEl.classList.remove("hidden");
        imgEl.addEventListener("click", () => showLightbox(imgEl.src));
      } else {
        imgEl.classList.add("hidden");
      }
      setHL(card.querySelector('[data-f="problem"]'),    d.problem || d.description, tokens);
      setHL(card.querySelector('[data-f="standard"]'),   d.standard, tokens);
      setHL(card.querySelector('[data-f="suggestion"]'), d.suggestion, tokens);

      // 复制按钮
      card.querySelectorAll("[data-copy]").forEach(btn => {
        btn.addEventListener("click", e => {
          const kind = btn.dataset.copy;
          let text = "";
          if (kind === "problem")        text = d.problem || d.description;
          else if (kind === "suggestion") text = d.suggestion;
          else if (kind === "all") {
            text = `【${d.category_period} · ${d.category_major}】\n` +
                   `问题:${d.problem || d.description}\n` +
                   (d.standard ? `依据:${d.standard}\n` : "") +
                   `建议:${d.suggestion}`;
          }
          // 埋点:复制行为(包含缺陷 ID,可以看哪些条目最常被引用)
          track('copy', kind, d.global_id);
          copy(text).then(ok => toast(ok ? `已复制 (${text.length} 字)` : "复制失败"));
        });
      });

      list.appendChild(node);
    }

    // 标题计数 + 加载更多
    $("#count").textContent = `${total} 条`;
    if (slice.length < total) {
      const more = document.createElement("button");
      more.className = "w-full py-3 text-sm text-[#1F4E78] bg-white rounded-xl border border-slate-100";
      more.textContent = `继续加载 (${total - slice.length} 条剩余)`;
      more.addEventListener("click", () => { state.page++; render(); window.scrollTo(0, document.body.scrollHeight - 600); });
      list.appendChild(more);
    }
  }

  // ----------- 工具 -----------
  function uniq(arr) {
    const s = new Set();
    return arr.filter(x => x && (s.has(x) ? false : (s.add(x), true)));
  }
  function escapeHTML(s) {
    return (s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }
  function setHL(el, text, tokens) {
    if (!text) { el.textContent = ""; return; }
    if (!tokens.length) { el.textContent = text; return; }
    // 在 escape 后的字符串上找原文索引
    let html = escapeHTML(text);
    // 不区分大小写,在原文层面替换;tokens 已 trim
    tokens.forEach(t => {
      if (!t) return;
      const re = new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "gi");
      html = html.replace(re, m => `<span class="hl">${m}</span>`);
    });
    el.innerHTML = html;
  }
  function toast(msg) {
    const el = $("#toast");
    el.textContent = msg;
    el.style.opacity = "1";
    clearTimeout(toast._t);
    toast._t = setTimeout(() => { el.style.opacity = "0"; }, 1400);
  }
  // Clipboard:HTTP 内网也要可用,做 fallback
  async function copy(text) {
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return true;
      }
    } catch (e) { /* fallthrough */ }
    try {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      const ok = document.execCommand("copy");
      document.body.removeChild(ta);
      return ok;
    } catch (e) { return false; }
  }
})();
</script>
</body>
</html>
